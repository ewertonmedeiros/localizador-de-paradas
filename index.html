<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Localizador de Paradas | CCO - Malha Sul</title>
    
    <!-- CSS do Leaflet para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Paleta de Cores e Estilos Base herdados do Systemp */
        :root {
            --cor-primaria: #0A1C2C;
            --cor-secundaria: #53A53B;
            --cor-fundo: #F4F7F6;
            --cor-texto: #333333;
            --cor-branco: #FFFFFF;
            
            --alert-color: #e67e22;
            --alert-hover: #d35400;
            --whatsapp-color: #25D366;   
            --whatsapp-hover: #1DA851;
            --cor-slider: #cbd5e1;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        /* Estrutura principal do Systemp */
        body { 
            background-color: var(--cor-fundo); 
            color: var(--cor-texto); 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* Cabeçalho Oficial */
        header { 
            background-color: var(--cor-primaria); 
            color: var(--cor-branco); 
            padding: 1rem; 
            border-bottom: 5px solid var(--cor-secundaria); 
            position: relative; 
            z-index: 1001; 
            flex-shrink: 0;
        }
        
        .header-content { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto; 
            text-align: center; 
        }
        
        .header-text h1 { 
            font-size: 1.8rem; 
            margin-bottom: 0.2rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .header-text h2 { 
            font-size: 1.1rem; 
            font-weight: 300; 
            color: var(--cor-secundaria); 
        }

        /* Área Principal */
        main { 
            flex: 1; 
            padding: 1rem 2rem; 
            max-width: 1200px; 
            margin: 0 auto; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem;
        }

        /* Painel de Controles (Estilo Card Systemp) */
        .card-controls {
            background-color: var(--cor-branco); 
            border-radius: 8px; 
            padding: 1.5rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-top: 5px solid var(--cor-primaria);
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            background-color: var(--cor-fundo); 
            border: 1px solid #cccccc;
            color: var(--cor-texto);
            border-radius: 6px;
            font-size: 14px;
            min-width: 150px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--cor-secundaria);
            box-shadow: 0 0 0 2px rgba(83, 165, 59, 0.2);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 30px; /* Arredondamento do Systemp */
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            color: var(--cor-branco);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }

        .btn-search { background-color: var(--cor-primaria); flex: 1; }
        .btn-search:hover { background-color: #15324d; }

        .actions-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            display: none; 
            flex-wrap: wrap; 
        }

        .btn-share { background-color: var(--whatsapp-color); flex: 1; color: #000; min-width: 200px; }
        .btn-share:hover { background-color: var(--whatsapp-hover); color: #fff; }

        .btn-alert { background-color: var(--alert-color); flex: 1; min-width: 200px; }
        .btn-alert:hover { background-color: var(--alert-hover); }

        .btn-route { background-color: var(--cor-secundaria); flex: 1; min-width: 200px; }
        .btn-route:hover { background-color: #3d7d2a; }

        .info-panel {
            background-color: var(--cor-fundo);
            border-left: 4px solid var(--alert-color);
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
            color: var(--cor-texto);
            border: 1px solid #e0e0e0;
            border-left: 4px solid var(--alert-color);
        }

        /* Contêiner do Mapa */
        .map-container {
            flex: 1; /* Ocupa o espaço restante */
            min-height: 400px; 
            position: relative;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid var(--cor-secundaria);
            overflow: hidden;
            background-color: var(--cor-branco);
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1; 
        }

        /* Rodapé Oficial */
        footer { 
            background-color: var(--cor-primaria); 
            color: var(--cor-branco); 
            text-align: center; 
            padding: 1rem; 
            font-size: 0.9rem; 
            flex-shrink: 0;
        }
        
        footer span { 
            color: var(--cor-secundaria); 
            font-weight: bold; 
        }

        /* VISÃO MOBILE */
        @media (max-width: 768px) {
            .header-text h1 { font-size: 1.4rem; }
            .header-text h2 { font-size: 0.9rem; }
            
            main { padding: 1rem; gap: 1rem; }
            
            .card-controls { padding: 1rem; }
            
            .input-group, .actions-group {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn { width: 100%; padding: 14px; font-size: 15px; }

            .map-container {
                min-height: 50vh; /* Garante tamanho generoso para o mapa no celular */
            }
            
            footer { padding: 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-text">
                <h1>Localizador de Paradas de Trens</h1>
                <h2>CCO | Malha Sul</h2>
            </div>
        </div>
    </header>

    <main>
        <div class="card-controls" id="painelControles">
            <div class="input-group">
                <input type="number" id="lng" placeholder="Longitude (ex: -49.0633)" step="any">
                <input type="number" id="lat" placeholder="Latitude (ex: -25.4417)" step="any">
                <button class="btn btn-search" onclick="buscarNoMapa()">Exibir no Mapa</button>
            </div>

            <div class="actions-group" id="actionsGroup">
                <button class="btn btn-share" onclick="compartilharWhatsApp()">📱 Deslocar Equipe (WhatsApp)</button>
                <button class="btn btn-alert" onclick="calcularRotaEquipe()">🚨 Traçar Minha Rota</button>
                <button class="btn btn-route" onclick="tracarRotaGmaps()">🗺️ Abrir Google Maps</button>
            </div>

            <div class="info-panel" id="routeInfo"></div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>
    </main>

    <footer>
        Desenvolvido por <span>Ewerton Siqueira Medeiros</span> &copy; 2026.
    </footer>

    <!-- JS do Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([-25.4417, -49.0633], 6);
        let currentMarker = null;
        let equipeMarker = null;
        let routeLayer = null;
        let coordsAtuais = { lat: null, lng: null };

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        window.addEventListener('resize', function() {
            setTimeout(() => map.invalidateSize(), 200);
        });

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => map.invalidateSize(), 300);

            const params = new URLSearchParams(window.location.search);
            const urlLat = params.get('lat');
            const urlLng = params.get('lng');

            if (urlLat && urlLng) {
                document.getElementById('lat').value = urlLat;
                document.getElementById('lng').value = urlLng;
                buscarNoMapa();
            }
        });

        function buscarNoMapa() {
            const latInput = document.getElementById('lat').value;
            const lngInput = document.getElementById('lng').value;

            if(!latInput || !lngInput) {
                alert("Por favor, insira valores válidos para Longitude e Latitude.");
                return;
            }

            coordsAtuais.lat = parseFloat(latInput);
            coordsAtuais.lng = parseFloat(lngInput);

            map.flyTo([coordsAtuais.lat, coordsAtuais.lng], 16, {
                animate: true,
                duration: 1.5
            });

            if (currentMarker) map.removeLayer(currentMarker);
            if (equipeMarker) map.removeLayer(equipeMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            document.getElementById('routeInfo').style.display = 'none';

            currentMarker = L.marker([coordsAtuais.lat, coordsAtuais.lng]).addTo(map)
                .bindPopup(`<b>Parada do Trem</b><br>Lng: ${coordsAtuais.lng}<br>Lat: ${coordsAtuais.lat}`)
                .openPopup();

            document.getElementById('actionsGroup').style.display = 'flex';
        }

        function compartilharWhatsApp() {
            if(coordsAtuais.lat !== null && coordsAtuais.lng !== null) {
                let baseUrl = window.location.origin + window.location.pathname;
                
                if (baseUrl === "null" || baseUrl.includes("file://")) {
                    baseUrl = "SeuLinkHospedadoAqui"; 
                }

                const linkSistema = `${baseUrl}?lat=${coordsAtuais.lat}&lng=${coordsAtuais.lng}`;
                
                const mensagem = `*🚨 Deslocamento de Equipe Emergencial - CCO Malha Sul*\n\n*Localização da Parada:*\nLat: ${coordsAtuais.lat}\nLng: ${coordsAtuais.lng}\n\n*Acesse o link abaixo para visualizar a ocorrência no mapa e traçar sua rota até o local:*\n${linkSistema}\n\n⚠️ _Siga com cuidado, respeitando os limites da via. Se não for seguro, não faça._`;
                
                const urlWhatsApp = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
                window.open(urlWhatsApp, '_blank');
            }
        }

        function rolarParaResultado() {
            const painelInfo = document.getElementById('routeInfo');
            painelInfo.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function calcularRotaEquipe() {
            if (!navigator.geolocation) {
                alert("Seu navegador não suporta geolocalização.");
                return;
            }

            const infoPanel = document.getElementById('routeInfo');
            infoPanel.innerHTML = "Obtendo sua localização atual. Aguarde...";
            infoPanel.style.display = "block";
            rolarParaResultado();

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const equipeLat = position.coords.latitude;
                    const equipeLng = position.coords.longitude;

                    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${equipeLng},${equipeLat};${coordsAtuais.lng},${coordsAtuais.lat}?overview=full&geometries=geojson`;

                    fetch(osrmUrl)
                        .then(response => response.json())
                        .then(data => {
                            if(data.code !== "Ok") {
                                infoPanel.innerHTML = "Não foi possível traçar uma rota terrestre viável.";
                                return;
                            }

                            const route = data.routes[0];
                            const distanciaKm = (route.distance / 1000).toFixed(1);
                            const tempoMin = Math.round(route.duration / 60);

                            let tempoFormatado = `${tempoMin} min`;
                            if (tempoMin > 60) {
                                const horas = Math.floor(tempoMin / 60);
                                const minRestantes = tempoMin % 60;
                                tempoFormatado = `${horas}h ${minRestantes}min`;
                            }

                            infoPanel.innerHTML = `
                                <strong style="color: var(--alert-color);">🚨 Relatório de Deslocamento</strong><br>
                                <b>Distância:</b> ${distanciaKm} km<br>
                                <b>Tempo Estimado:</b> ${tempoFormatado}<br>
                                <button class="btn btn-route" style="margin-top: 12px; width: 100%; font-size: 15px;" onclick="tracarRotaGmaps()">🗺️ Iniciar Navegação no GPS</button>
                            `;
                            rolarParaResultado();

                            if (routeLayer) map.removeLayer(routeLayer);
                            if (equipeMarker) map.removeLayer(equipeMarker);

                            routeLayer = L.geoJSON(route.geometry, {
                                style: { color: '#e67e22', weight: 6, opacity: 0.8 }
                            }).addTo(map);

                            equipeMarker = L.marker([equipeLat, equipeLng]).addTo(map)
                                .bindPopup("<b>Sua Posição (Equipe)</b>");

                            map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
                            
                            setTimeout(() => map.invalidateSize(), 300);
                        })
                        .catch(err => {
                            console.error(err);
                            infoPanel.innerHTML = "Erro ao conectar com o servidor de rotas.";
                        });
                },
                (error) => {
                    infoPanel.innerHTML = "Erro ao obter localização. Ative o GPS do seu celular e dê permissão de localização ao navegador.";
                }
            );
        }

        function tracarRotaGmaps() {
            if(coordsAtuais.lat !== null && coordsAtuais.lng !== null) {
                const urlGmaps = `https://www.google.com/maps/dir/?api=1&destination=${coordsAtuais.lat},${coordsAtuais.lng}`;
                window.open(urlGmaps, '_blank');
            }
        }
    </script>
</body>
</html>
