<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CCO - Malha Sul</title>
    
    <!-- CSS do Leaflet para o mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            /* Paleta original */
            --bg-color: #121212;         
            --panel-bg: #0A1C2C;         
            --text-color: #53A53B;       
            --primary-color: #007bff;    
            --primary-hover: #0056b3;    
            --route-color: #28a745;      
            --route-hover: #218838;     
            --alert-color: #e67e22;
            --alert-hover: #d35400;
            --whatsapp-color: #25D366;   
            --whatsapp-hover: #1DA851;
            --border-color: #333333;     
        }

        /* Configuração Base */
        html, body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        /* ====================================================
           VISÃO DESKTOP (Padrão para telas grandes)
           ==================================================== */
        body {
            display: flex;
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }

        .app-wrapper {
            background-color: var(--panel-bg);
            width: 100%;
            max-width: 1000px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header {
            padding: 20px 25px 5px 25px;
            text-align: center;
        }

        .controls-panel {
            padding: 15px 25px 25px 25px;
        }

        h2 { margin: 0 0 5px 0; font-size: 24px; font-weight: 600; }
        .subtitle { margin: 0; color: #aaaaaa; font-size: 15px; }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            background-color: #112a40; 
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn {
            padding: 12px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background-color 0.3s;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-search { background-color: var(--primary-color); flex: 1; }
        .btn-search:hover { background-color: var(--primary-hover); }

        .actions-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            display: none; 
            flex-wrap: wrap; 
        }

        .btn-share { background-color: var(--whatsapp-color); flex: 1; color: #000; min-width: 200px; }
        .btn-share:hover { background-color: var(--whatsapp-hover); color: #fff; }

        .btn-alert { background-color: var(--alert-color); flex: 1; min-width: 200px; }
        .btn-alert:hover { background-color: var(--alert-hover); }

        .btn-route { background-color: var(--route-color); flex: 1; min-width: 200px; }
        .btn-route:hover { background-color: var(--route-hover); }

        .info-panel {
            background-color: #112a40;
            border-left: 4px solid var(--alert-color);
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .map-container {
            width: 100%;
            height: 500px; 
            position: relative;
            border-top: 1px solid var(--border-color);
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1; 
        }

        footer {
            text-align: center;
            padding: 12px;
            font-size: 12px;
            color: #888888;
            background-color: #081622;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        footer span {
            color: var(--text-color);
            font-weight: 600;
        }

        /* ====================================================
           VISÃO MOBILE (Telas menores que 768px)
           ==================================================== */
        @media (max-width: 768px) {
            html, body {
                overflow: hidden; 
                position: fixed;  
                width: 100%;
                height: 100%;
            }

            body {
                padding: 0;
                align-items: stretch; 
            }

            .app-wrapper {
                max-width: 100%;
                border-radius: 0;
                border: none;
                height: 100dvh; 
                display: flex;
                flex-direction: column;
            }

            .header { padding: 15px 15px 5px 15px; }
            h2 { font-size: 20px; }

            .controls-panel { 
                padding: 10px 15px 15px 15px; 
                max-height: 55vh; 
                overflow-y: auto; 
                flex-shrink: 0;
            }

            .controls-panel::-webkit-scrollbar { width: 4px; }
            .controls-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

            .input-group, .actions-group {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 10px;
            }
            
            .btn { padding: 14px 15px; font-size: 15px; min-width: 100%; }

            .map-container {
                flex: 1; 
                min-height: 35vh; 
            }
            
            footer {
                padding: 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="header">
            <h2>CCO - Malha Sul</h2>
            <p class="subtitle">Localizador de Paradas e Despacho de Equipes</p>
        </div>
        
        <div class="controls-panel" id="painelControles">
            <div class="input-group">
                <input type="number" id="lng" placeholder="Longitude (ex: -49.0633)" step="any">
                <input type="number" id="lat" placeholder="Latitude (ex: -25.4417)" step="any">
                <button class="btn btn-search" onclick="buscarNoMapa()">Exibir no Mapa</button>
            </div>

            <div class="actions-group" id="actionsGroup">
                <button class="btn btn-share" onclick="compartilharWhatsApp()">📱 Despachar Equipe (WhatsApp)</button>
                <button class="btn btn-alert" onclick="calcularRotaEquipe()">🚨 Traçar Minha Rota</button>
                <button class="btn btn-route" onclick="tracarRotaGmaps()">🗺️ Abrir Google Maps</button>
            </div>

            <div class="info-panel" id="routeInfo"></div>
        </div>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <footer>
            Desenvolvido por <span>Ewerton Siqueira Medeiros</span> &copy; 2026.
        </footer>
    </div>

    <!-- JS do Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([-25.4417, -49.0633], 6);
        let currentMarker = null;
        let equipeMarker = null;
        let routeLayer = null;
        let coordsAtuais = { lat: null, lng: null };

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        window.addEventListener('resize', function() {
            map.invalidateSize();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const urlLat = params.get('lat');
            const urlLng = params.get('lng');

            if (urlLat && urlLng) {
                document.getElementById('lat').value = urlLat;
                document.getElementById('lng').value = urlLng;
                buscarNoMapa();
            }
        });

        function rolarPainelParaFim() {
            const painel = document.getElementById('painelControles');
            painel.scrollTo({
                top: painel.scrollHeight,
                behavior: 'smooth'
            });
        }

        function buscarNoMapa() {
            const latInput = document.getElementById('lat').value;
            const lngInput = document.getElementById('lng').value;

            if(!latInput || !lngInput) {
                alert("Por favor, insira valores válidos para Longitude e Latitude.");
                return;
            }

            coordsAtuais.lat = parseFloat(latInput);
            coordsAtuais.lng = parseFloat(lngInput);

            map.flyTo([coordsAtuais.lat, coordsAtuais.lng], 16, {
                animate: true,
                duration: 1.5
            });

            if (currentMarker) map.removeLayer(currentMarker);
            if (equipeMarker) map.removeLayer(equipeMarker);
            if (routeLayer) map.removeLayer(routeLayer);
            document.getElementById('routeInfo').style.display = 'none';

            currentMarker = L.marker([coordsAtuais.lat, coordsAtuais.lng]).addTo(map)
                .bindPopup(`<b>Parada do Trem</b><br>Lng: ${coordsAtuais.lng}<br>Lat: ${coordsAtuais.lat}`)
                .openPopup();

            document.getElementById('actionsGroup').style.display = 'flex';
        }

        function compartilharWhatsApp() {
            if(coordsAtuais.lat !== null && coordsAtuais.lng !== null) {
                let baseUrl = window.location.origin + window.location.pathname;
                
                if (baseUrl === "null" || baseUrl.includes("file://")) {
                    baseUrl = "SeuLinkHospedadoAqui"; 
                }

                const linkSistema = `${baseUrl}?lat=${coordsAtuais.lat}&lng=${coordsAtuais.lng}`;
                const mensagem = `*🚨 Despacho de Equipe - CCO Malha Sul*\n\n*Localização da Parada:*\nLat: ${coordsAtuais.lat}\nLng: ${coordsAtuais.lng}\n\n*Acesse o link abaixo para visualizar a ocorrência no mapa e traçar sua rota até o local:*\n${linkSistema}`;
                
                const urlWhatsApp = `https://api.whatsapp.com/send?text=${encodeURIComponent(mensagem)}`;
                window.open(urlWhatsApp, '_blank');
            }
        }

        function calcularRotaEquipe() {
            if (!navigator.geolocation) {
                alert("Seu navegador não suporta geolocalização.");
                return;
            }

            const infoPanel = document.getElementById('routeInfo');
            infoPanel.innerHTML = "Obtendo sua localização atual. Aguarde...";
            infoPanel.style.display = "block";
            rolarPainelParaFim(); 

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const equipeLat = position.coords.latitude;
                    const equipeLng = position.coords.longitude;

                    const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${equipeLng},${equipeLat};${coordsAtuais.lng},${coordsAtuais.lat}?overview=full&geometries=geojson`;

                    fetch(osrmUrl)
                        .then(response => response.json())
                        .then(data => {
                            if(data.code !== "Ok") {
                                infoPanel.innerHTML = "Não foi possível traçar uma rota terrestre viável.";
                                return;
                            }

                            const route = data.routes[0];
                            const distanciaKm = (route.distance / 1000).toFixed(1);
                            const tempoMin = Math.round(route.duration / 60);

                            let tempoFormatado = `${tempoMin} min`;
                            if (tempoMin > 60) {
                                const horas = Math.floor(tempoMin / 60);
                                const minRestantes = tempoMin % 60;
                                tempoFormatado = `${horas}h ${minRestantes}min`;
                            }

                            infoPanel.innerHTML = `
                                <strong style="color: var(--alert-color);">🚨 Relatório de Deslocamento</strong><br>
                                <b>Distância:</b> ${distanciaKm} km<br>
                                <b>Tempo Estimado:</b> ${tempoFormatado}
                            `;
                            rolarPainelParaFim(); 

                            if (routeLayer) map.removeLayer(routeLayer);
                            if (equipeMarker) map.removeLayer(equipeMarker);

                            routeLayer = L.geoJSON(route.geometry, {
                                style: { color: '#e67e22', weight: 6, opacity: 0.8 }
                            }).addTo(map);

                            equipeMarker = L.marker([equipeLat, equipeLng]).addTo(map)
                                .bindPopup("<b>Sua Posição (Equipe)</b>");

                            map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
                            
                            setTimeout(() => map.invalidateSize(), 300);
                        })
                        .catch(err => {
                            console.error(err);
                            infoPanel.innerHTML = "Erro ao conectar com o servidor de rotas.";
                        });
                },
                (error) => {
                    infoPanel.innerHTML = "Erro ao obter localização. Ative o GPS do seu celular e dê permissão de localização ao navegador.";
                }
            );
        }

        function tracarRotaGmaps() {
            if(coordsAtuais.lat !== null && coordsAtuais.lng !== null) {
                const urlGmaps = `https://www.google.com/maps/dir/?api=1&destination=${coordsAtuais.lat},${coordsAtuais.lng}`;
                window.open(urlGmaps, '_blank');
            }
        }
    </script>
</body>
</html>
